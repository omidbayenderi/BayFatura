<svg width="256" height="256" viewBox="0 0 256 256" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- Soft Shadow behind the whole icon -->
  <filter id="shadow" x="-10%" y="-10%" width="120%" height="120%">
    <feDropShadow dx="0" dy="6" stdDeviation="8" flood-color="#0f172a" flood-opacity="0.15"/>
  </filter>

  <!-- Document Base Gradient -->
  <linearGradient id="docGrad" x1="0" y1="0" x2="256" y2="256" gradientUnits="userSpaceOnUse">
    <stop stop-color="#3b82f6"/>
    <stop offset="1" stop-color="#1d4ed8"/>
  </linearGradient>

  <!-- B Gradient -->
  <linearGradient id="textGrad" x1="128" y1="120" x2="128" y2="220" gradientUnits="userSpaceOnUse">
    <stop stop-color="#ffffff"/>
    <stop offset="1" stop-color="#e0e7ff"/>
  </linearGradient>

  <!-- The Document Shape (A4 like, rounded corners) -->
  <g filter="url(#shadow)">
    <!-- Base Paper -->
    <path d="M56 32 C56 23.1634 63.1634 16 72 16 L154 16 L208 70 L208 224 C208 232.837 200.837 240 192 240 L72 240 C63.1634 240 56 232.837 56 224 L56 32 Z" fill="url(#docGrad)"/>
    
    <!-- Top Right Fold -->
    <path d="M154 16 L154 54 C154 62.8366 161.163 70 170 70 L208 70 L154 16 Z" fill="#60a5fa" fill-opacity="0.9"/>
  </g>

  <!-- Invoice Lines (Sleek abstract lines to represent a bill) -->
  <rect x="88" y="80" width="48" height="8" rx="4" fill="#60a5fa" fill-opacity="0.8"/>
  <rect x="88" y="100" width="80" height="8" rx="4" fill="#93c5fd" fill-opacity="0.6"/>
  <rect x="88" y="120" width="60" height="8" rx="4" fill="#93c5fd" fill-opacity="0.6"/>

  <!-- The beautiful Letter B -->
  <!-- Made bold and elegant, overlapping the bottom of the document -->
  <text x="128" y="200" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif" font-weight="800" font-size="96" font-style="italic" fill="url(#textGrad)" text-anchor="middle" filter="url(#shadow)">B</text>
  
  <!-- An accent dot or shape for modern SaaS look -->
  <circle cx="180" cy="190" r="12" fill="#facc15" filter="url(#shadow)"/>
</svg>
