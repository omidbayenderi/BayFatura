name: Deploy Production (Manual Only)

on:
  workflow_dispatch:
    inputs:
      reason:
        description: 'Reason for production deploy'
        required: true
        default: 'Manual production release'
      deployFunctions:
        description: 'Deploy Cloud Functions too?'
        type: boolean
        default: false

concurrency:
  group: production-deploy
  cancel-in-progress: false

jobs:
  quality:
    name: Lint & Test & Build
    runs-on: ubuntu-latest
    environment: production

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Run tests
        run: npm test
        env:
          NODE_ENV: test

      - name: Build
        run: npm run build
        env:
          VITE_FIREBASE_API_KEY: ${{ secrets.VITE_FIREBASE_API_KEY }}
          VITE_FIREBASE_AUTH_DOMAIN: ${{ secrets.VITE_FIREBASE_AUTH_DOMAIN }}
          VITE_FIREBASE_PROJECT_ID: ${{ secrets.VITE_FIREBASE_PROJECT_ID }}
          VITE_FIREBASE_STORAGE_BUCKET: ${{ secrets.VITE_FIREBASE_STORAGE_BUCKET }}
          VITE_FIREBASE_MESSAGING_SENDER_ID: ${{ secrets.VITE_FIREBASE_MESSAGING_SENDER_ID }}
          VITE_FIREBASE_APP_ID: ${{ secrets.VITE_FIREBASE_APP_ID }}
          VITE_FIREBASE_MEASUREMENT_ID: ${{ secrets.VITE_FIREBASE_MEASUREMENT_ID }}
          VITE_SUCCESS_URL: ${{ secrets.VITE_SUCCESS_URL }}
          VITE_CANCEL_URL: ${{ secrets.VITE_CANCEL_URL }}
          VITE_FROM_EMAIL: ${{ secrets.VITE_FROM_EMAIL }}
          VITE_SENTRY_DSN: ${{ secrets.VITE_SENTRY_DSN }}
          VITE_APP_ENV: production

      - name: Deploy to Firebase Hosting (Production)
        uses: FirebaseExtended/action-hosting-deploy@v0
        with:
          repoToken: ${{ secrets.GITHUB_TOKEN }}
          firebaseServiceAccount: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}
          projectId: ${{ secrets.VITE_FIREBASE_PROJECT_ID }}
          channelId: live

      - name: Deploy Cloud Functions
        if: inputs.deployFunctions
        run: npx firebase deploy --only functions --token "$FIREBASE_DEPLOY_TOKEN"
        env:
          FIREBASE_DEPLOY_TOKEN: ${{ secrets.FIREBASE_DEPLOY_TOKEN }}

      - name: Deploy Firestore & Storage Rules
        run: npx firebase deploy --only firestore,storage --token "$FIREBASE_DEPLOY_TOKEN"
        env:
          FIREBASE_DEPLOY_TOKEN: ${{ secrets.FIREBASE_DEPLOY_TOKEN }}
